<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <title>KRONIX // Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass-panel { background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(8px); }
        .neon-border:focus { border: 1px solid #38bdf8; box-shadow: 0 0 10px rgba(56, 189, 248, 0.2); }
    </style>
</head>
<body>

    <nav class="border-b border-slate-800 p-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tighter text-sky-400">// KRONIX</h1>
            <div class="flex gap-6 text-sm">
                <a href="/dashboard" class="text-white border-b border-sky-400 pb-1">CONSOLE</a>
                <a href="/ddos" class="hover:text-sky-300 transition">STRESSER</a>
                <a href="/plans" class="hover:text-sky-300 transition">SUBS</a>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto mt-12 px-4">
        <div class="glass-panel p-8 rounded-xl shadow-2xl">
            <h2 class="text-2xl font-semibold mb-6 italic">// RECON_MODE</h2>
            <div class="flex gap-2">
                <input id="q" placeholder="target_id or address..." class="w-full bg-slate-950 p-4 rounded-lg neon-border outline-none transition">
                <button onclick="search()" class="bg-sky-600 px-8 rounded-lg font-bold hover:bg-sky-500 transition">EXEC</button>
            </div>
            <div id="results" class="mt-8 space-y-3"></div>
        </div>
    </main>

    <script>
        function search() {
            const q = document.getElementById('q').value;
            fetch(`/api/search?q=${q}`)
                .then(r => r.json())
                .then(data => {
                    document.getElementById('results').innerHTML = data.map(item => `
                        <div class="p-4 border-l-2 border-sky-500 bg-slate-900/50 rounded-r-lg text-sm">
                            <span class="text-sky-400 font-mono">[RESULT]</span> ${item.username} - ${item.status}
                        </div>`).join('');
                });
        }
    </script>
</body>
</html>
