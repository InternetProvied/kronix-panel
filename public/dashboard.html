<!DOCTYPE html>
<html lang="fr">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white p-10">
    <div id="admin-panel" class="hidden border border-violet-500 p-6 rounded-lg bg-slate-900 mb-10">
        <h2 class="text-violet-400 font-black mb-4">PANEL ADMINISTRATEUR</h2>
        <input id="uid" placeholder="ID MongoDB" class="bg-black border border-violet-500 p-2 text-white">
        <button onclick="update()" class="bg-violet-600 px-4 py-2 hover:bg-violet-700">Promouvoir Admin</button>
    </div>

    <script>
        fetch('/api/user').then(r => r.json()).then(user => {
            if (user.role === 'admin') document.getElementById('admin-panel').classList.remove('hidden');
        });

        async function update() {
            const userId = document.getElementById('uid').value;
            await fetch('/api/admin/update-role', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ userId, newPlan: 'admin' })
            });
            alert('Mise à jour réussie !');
        }
    </script>
</body>
</html>
