<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kronix - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .neon-shadow { box-shadow: 0 0 15px rgba(147, 51, 234, 0.15); }
    </style>
</head>
<body class="bg-[#050508] text-gray-200 min-h-screen font-sans antialiased">

    <nav class="bg-[#0b0b12]/90 backdrop-blur-md border-b border-purple-950/20 px-6 py-4 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-8">
                <span class="text-2xl font-black font-mono tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-purple-600">KRONIX</span>
                <div class="flex items-center gap-1 text-sm font-medium text-gray-400">
                    <a href="/dashboard" class="bg-purple-950/30 text-purple-400 px-4 py-2 rounded-xl border border-purple-900/30 transition">Panel</a>
                    <a href="/ddos" class="hover:text-purple-400 px-4 py-2 transition font-mono">DDOS</a>
                    <a href="/plans" class="hover:text-purple-400 px-4 py-2 transition font-mono">PLANS</a>
                </div>
            </div>
            <a href="/logout" class="bg-red-950/20 border border-red-900/30 text-red-400 px-3 py-2 rounded-xl text-xs font-bold hover:bg-red-900/40 transition">Déconnexion</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <h2 class="text-xl font-bold text-white">Module de Recherche Global</h2>
        <div class="w-full bg-[#0b0b12]/50 border border-purple-950/20 rounded-2xl p-4 flex gap-3 mt-4 mb-8 neon-shadow">
            <input type="text" id="search-input" placeholder="Entrez un pseudo, email, IP..." class="flex-1 bg-[#050508] border border-gray-900 rounded-xl py-3 px-4 text-sm text-white">
            <button onclick="launchSearch()" class="bg-purple-600 hover:bg-purple-500 text-white font-bold px-6 rounded-xl text-sm">Rechercher</button>
        </div>
        <div id="results-zone" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </main>

    <script>
        function launchSearch() {
            const query = document.getElementById('search-input').value;
            fetch(`/api/search?q=${encodeURIComponent(query)}`)
                .then(res => res.json())
                .then(data => {
                    const zone = document.getElementById('results-zone');
                    zone.innerHTML = data.map(item => `
                        <div class="bg-[#0b0b12] border border-gray-900 p-5 rounded-2xl">
                            <h3 class="text-white font-bold">${item.username}</h3>
                            <p class="text-xs text-purple-400 font-mono">${item.status}</p>
                        </div>`).join('');
                });
        }
    </script>
</body>
</html>
