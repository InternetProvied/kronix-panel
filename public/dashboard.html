<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Kronix | Professional Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #030303; color: #a3a3a3; }
        .card { background: #0a0a0a; border: 1px solid #171717; }
        .gradient-text { background: linear-gradient(to right, #fff, #666); -webkit-background-clip: text; color: transparent; }
    </style>
</head>
<body class="p-6">
    <!-- Stats Row -->
    <div class="max-w-6xl mx-auto grid grid-cols-3 gap-4 mb-8">
        <div class="card p-4 rounded-xl">
            <p class="text-[10px] uppercase tracking-widest text-gray-600">Recherches Totales</p>
            <h3 class="text-2xl font-bold text-white">1,284</h3>
        </div>
        <div class="card p-4 rounded-xl">
            <p class="text-[10px] uppercase tracking-widest text-gray-600">Balance Actuelle</p>
            <h3 class="text-2xl font-bold text-white">€450.00</h3>
        </div>
        <div class="card p-4 rounded-xl">
            <p class="text-[10px] uppercase tracking-widest text-gray-600">Status Serveur</p>
            <h3 class="text-2xl font-bold text-green-500">ONLINE</h3>
        </div>
    </div>

    <!-- Search Section -->
    <main class="max-w-6xl mx-auto">
        <div class="card p-6 rounded-2xl mb-8">
            <h2 class="text-lg font-bold text-white mb-4">Module de Recherche</h2>
            <div class="flex gap-2">
                <input id="search-input" placeholder="ID, IP ou Username..." class="flex-1 bg-[#050505] border border-[#171717] px-4 py-3 rounded-lg text-sm text-white">
                <button onclick="launchSearch()" class="bg-white text-black px-6 py-3 rounded-lg text-sm font-bold hover:bg-gray-200">Rechercher</button>
            </div>
        </div>
        <div id="results-zone" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </main>
</body>
</html>
