<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-[#0b0e14] text-gray-200 min-h-screen">

    <nav class="border-b border-violet-900/50 p-6 flex justify-between items-center bg-[#0e1219]">
        <h1 class="text-2xl font-black text-violet-500 tracking-tighter">KRONIX<span class="text-white">PANEL</span></h1>
        <div id="user-info" class="text-sm border border-violet-900/50 px-4 py-2 rounded-full">Chargement...</div>
    </nav>

    <main class="p-10 max-w-6xl mx-auto">
        <section id="admin-panel" class="hidden mb-10 p-8 border border-violet-500/30 rounded-2xl bg-gradient-to-br from-violet-950/20 to-transparent">
            <h2 class="text-violet-400 font-bold mb-4 flex items-center gap-2"><i class="fas fa-shield-halved"></i> ADMINISTRATION</h2>
            <div class="flex gap-4">
                <input id="uid" placeholder="Entrer l'ID utilisateur" class="bg-black border border-violet-500/50 p-3 rounded-lg w-64 text-white placeholder:text-gray-600">
                <button onclick="update()" class="bg-violet-600 hover:bg-violet-500 px-6 py-2 rounded-lg font-bold transition">PROMOUVOIR ADMIN</button>
            </div>
        </section>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="p-6 border border-violet-900/30 rounded-xl bg-[#0e1219]">
                <p class="text-gray-500 text-xs uppercase">Statut</p>
                <p class="text-2xl font-bold mt-2">Actif</p>
            </div>
            <div class="p-6 border border-violet-900/30 rounded-xl bg-[#0e1219]">
                <p class="text-gray-500 text-xs uppercase">Connecté via</p>
                <p class="text-2xl font-bold mt-2" id="method">...</p>
            </div>
            <div class="p-6 border border-violet-900/30 rounded-xl bg-[#0e1219]">
                <p class="text-gray-500 text-xs uppercase">Rôle</p>
                <p class="text-2xl font-bold mt-2 text-violet-400" id="role-text">...</p>
            </div>
        </div>
    </main>

    <script>
        // Charger les infos
        fetch('/api/user').then(r => r.json()).then(user => {
            document.getElementById('user-info').innerText = user.username;
            document.getElementById('role-text').innerText = user.role;
            document.getElementById('method').innerText = "Session";
            
            // Afficher le panel admin si nécessaire
            if (user.role === 'admin') {
                document.getElementById('admin-panel').classList.remove('hidden');
            }
        });

        // Fonction Admin
        async function update() {
            const userId = document.getElementById('uid').value;
            const res = await fetch('/api/admin/update-role', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ userId, newPlan: 'admin' })
            });
            if((await res.json()).success) alert('✅ Succès');
            else alert('❌ Erreur');
        }
    </script>
</body>
</html>
