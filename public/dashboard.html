<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(139, 92, 246, 0.2); }
        .glow { box-shadow: 0 0 20px rgba(139, 92, 246, 0.15); }
    </style>
</head>
<body class="bg-black text-white font-sans min-h-screen p-4 md:p-10">

    <!-- Header -->
    <header class="flex justify-between items-center mb-10">
        <div>
            <h1 class="text-4xl font-black italic tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-violet-400 to-purple-600">KRONIX</h1>
            <p class="text-gray-500 text-sm">Interface de contrôle sécurisée</p>
        </div>
        <div class="glass px-6 py-2 rounded-full font-mono text-violet-400" id="username-display">Chargement...</div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <!-- Admin Panel (Affiché seulement si Admin) -->
        <section id="admin-panel" class="hidden lg:col-span-3 glass p-8 rounded-3xl glow">
            <h2 class="text-violet-400 font-bold mb-6 uppercase tracking-widest text-sm">Zone Administration</h2>
            <div class="flex gap-4">
                <input id="uid" class="bg-black/50 border border-violet-500/30 p-4 rounded-xl flex-1 text-white focus:outline-none focus:border-violet-500 transition" placeholder="ID MongoDB de l'utilisateur...">
                <button onclick="update()" class="bg-gradient-to-r from-violet-600 to-purple-700 px-8 py-4 rounded-xl font-bold hover:scale-105 transition duration-300 shadow-lg shadow-violet-900/20">PROMOUVOIR</button>
            </div>
        </section>

        <!-- Stats -->
        <div class="glass p-8 rounded-3xl">
            <h3 class="text-gray-400 text-xs uppercase mb-2">Statut Serveur</h3>
            <p class="text-3xl font-black text-green-500">EN LIGNE</p>
        </div>
        
        <div class="glass p-8 rounded-3xl">
            <h3 class="text-gray-400 text-xs uppercase mb-2">Utilisateurs</h3>
            <p class="text-3xl font-black text-white">128</p>
        </div>

        <div class="glass p-8 rounded-3xl border-violet-500/50">
            <h3 class="text-gray-400 text-xs uppercase mb-2">Rôle Actuel</h3>
            <p class="text-3xl font-black text-violet-400" id="role-display">...</p>
        </div>
    </div>

    <script>
        fetch('/api/user').then(r => r.json()).then(user => {
            document.getElementById('username-display').innerText = user.username;
            document.getElementById('role-display').innerText = user.role.toUpperCase();
            if (user.role === 'admin') document.getElementById('admin-panel').classList.remove('hidden');
        });

        async function update() {
            const userId = document.getElementById('uid').value;
            const res = await fetch('/api/admin/update-role', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ userId, newPlan: 'admin' })
            });
            if((await res.json()).success) {
                alert('✅ Utilisateur promu !');
                window.location.reload();
            } else {
                alert('❌ Accès refusé');
            }
        }
    </script>
</body>
</html>
