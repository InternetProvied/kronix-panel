<!DOCTYPE html>
<html lang="fr">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { background: #020205; margin: 0; overflow: hidden; color: white; font-family: monospace; }
        #canvas-container { position: fixed; top: 0; left: 0; z-index: 0; }
        .dashboard-grid { display: grid; grid-template-columns: 350px 1fr 350px; gap: 20px; padding: 20px; position: relative; z-index: 10; height: 100vh; align-items: center; }
        .glass { background: rgba(15, 15, 25, 0.7); border: 1px solid #332060; border-radius: 15px; backdrop-filter: blur(10px); padding: 20px; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div class="dashboard-grid">
        <!-- Colonne Gauche : API -->
        <div class="glass h-[500px]">
            <h2 class="font-bold text-purple-400 mb-4">API / SUBSCRIPTIONS</h2>
            <!-- Ajouter ici les cartes des abonnements -->
        </div>

        <!-- Colonne Centre : Logo + Recherche -->
        <div class="flex flex-col items-center gap-6">
            <div class="text-3xl font-black text-white">PokeDox</div>
            <div class="glass w-full">
                <input type="text" placeholder="Enter a Discord ID..." class="w-full bg-black border border-slate-700 p-3 rounded">
            </div>
        </div>

        <!-- Colonne Droite : Tickets -->
        <div class="glass h-[500px]">
            <h2 class="font-bold text-purple-400 mb-4">TICKETS / SUPPORT</h2>
        </div>
    </div>

    <script>
        // Moteur 3D Three.js pour le fond (Pistons)
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Ajout des cubes (Pistons)
        const geometry = new THREE.BoxGeometry(1, 5, 1);
        for(let i=0; i<400; i++) {
            const material = new THREE.MeshBasicMaterial({ color: 0x2e1065 });
            const cube = new THREE.Mesh(geometry, material);
            cube.position.set((i%20)*2 - 20, -2, Math.floor(i/20)*2 - 20);
            scene.add(cube);
        }
        camera.position.z = 20;
        camera.position.y = 10;
        camera.rotation.x = -0.5;

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
