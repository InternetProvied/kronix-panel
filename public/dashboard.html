<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>OathNet | Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: radial-gradient(circle at center, #1e1b4b 0%, #030303 70%); min-height: 100vh; color: #fff; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .input-glow:focus { box-shadow: 0 0 15px rgba(139, 92, 246, 0.3); border-color: #8b5cf6; }
    </style>
</head>
<body>
    <nav class="glass m-6 rounded-2xl px-8 py-4 flex items-center justify-between max-w-6xl mx-auto">
        <div class="font-black text-xl tracking-tighter">OATHNET</div>
        <div class="flex gap-8 text-sm text-gray-400">
            <a href="/dashboard" class="text-white">Home</a>
            <a href="/plans" class="hover:text-white transition">Pricing</a>
            <a href="#" class="hover:text-white transition">API Keys</a>
        </div>
        <a href="/logout" class="text-xs text-red-400">Logout</a>
    </nav>

    <main class="max-w-4xl mx-auto mt-20 text-center">
        <h1 class="text-5xl font-bold mb-6">Threat Intelligence Unit</h1>
        <div class="glass p-4 rounded-2xl flex items-center shadow-2xl">
            <input id="q" placeholder="domain: example.org / ip: 1.1.1.1" class="w-full bg-transparent p-4 outline-none text-sm input-glow">
            <button onclick="search()" class="bg-white text-black px-8 py-3 rounded-xl font-bold text-sm hover:bg-gray-200">Search →</button>
        </div>
        <div id="results" class="mt-8 space-y-4"></div>
    </main>

    <script>
        function search() {
            const q = document.getElementById('q').value;
            fetch(`/api/search?q=${q}`).then(r => r.json()).then(data => {
                document.getElementById('results').innerHTML = data.map(item => `
                    <div class="glass p-6 rounded-xl text-left">
                        <h3 class="font-bold text-purple-400">${item.username}</h3>
                        <p class="text-xs text-gray-400 mt-1">Status: ${item.status} | IP: ${item.ipAddress}</p>
                    </div>`).join('');
            });
        }
    </script>
</body>
</html>
