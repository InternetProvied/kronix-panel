<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeDox | Connexion</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#020205] text-slate-300 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-sm bg-slate-950 border border-slate-900 rounded-2xl p-6 text-center shadow-2xl">
        <div class="font-mono tracking-widest text-sm font-black text-white mb-6">POKEDOX//SECURITY</div>
        <form action="/login" method="POST" class="space-y-4 text-left text-xs">
            <div>
                <label class="block text-slate-500 mb-1">Identifiant Administrateur</label>
                <input type="text" name="username" required placeholder="admin" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-3 text-slate-200 focus:outline-none focus:border-purple-600 font-mono">
            </div>
            <div>
                <label class="block text-slate-500 mb-1">Mot de passe master</label>
                <input type="password" name="password" required placeholder="••••••••" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-3 text-slate-200 focus:outline-none focus:border-purple-600 font-mono">
            </div>
            <button type="submit" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 rounded-xl transition text-sm">Entrer sur le système</button>
        </form>
    </div>
</body>
</html>
