<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | Kronix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #05070f;
            overflow: hidden;
        }
        .cyber-glow {
            position: absolute;
            width: 600px;
            height: 300px;
            background: radial-gradient(circle, rgba(147, 51, 234, 0.2) 0%, rgba(79, 70, 229, 0.05) 50%, rgba(0,0,0,0) 100%);
            filter: blur(60px);
            pointer-events: none;
            z-index: 1;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body class="text-white font-sans antialiased flex items-center justify-center min-h-screen relative p-4">

    <div class="cyber-glow"></div>

    <div class="w-full max-w-md bg-gray-950/40 backdrop-blur-2xl border border-gray-900 rounded-3xl p-8 shadow-2xl relative z-10 flex flex-col items-center">
        
        <div class="w-20 h-20 rounded-full bg-gradient-to-b from-gray-900 to-purple-950/40 border border-purple-500/30 flex items-center justify-center shadow-[0_0_30px_rgba(147,51,234,0.2)] mb-4">
            <svg class="w-8 h-8 text-purple-400 drop-shadow-[0_0_8px_rgba(168,85,247,0.5)]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
            </svg>
        </div>

        <div class="text-[10px] tracking-widest font-mono text-purple-400 uppercase bg-purple-500/5 border border-purple-500/10 px-3 py-1 rounded-full mb-6">
            SYSTÈME SYNCHRONISÉ AVEC XNFZ.OFF_26387
        </div>

        <h1 class="text-xl font-black tracking-wide mb-1 text-center">PANEL KRONIX</h1>
        <p class="text-xs text-gray-500 text-center mb-8">Authentification requise pour accéder au moteur de recherche</p>

        <form action="/login" method="POST" class="w-full space-y-4 font-mono text-xs">
            <div>
                <label class="block text-gray-400 mb-1.5 px-1">NOM D'UTILISATEUR</label>
                <input type="text" name="username" required placeholder="ex: Admin" class="w-full bg-gray-950/80 border border-gray-900 focus:border-purple-500/50 rounded-xl px-4 py-3 text-gray-300 focus:outline-none transition duration-200">
            </div>

            <div>
                <label class="block text-gray-400 mb-1.5 px-1">MOT DE PASSE</label>
                <input type="password" name="password" required placeholder="••••••••" class="w-full bg-gray-950/80 border border-gray-900 focus:border-purple-500/50 rounded-xl px-4 py-3 text-gray-300 focus:outline-none transition duration-200">
            </div>

            <button type="submit" class="w-full bg-purple-600 hover:bg-purple-500 text-white font-bold py-3.5 px-4 rounded-xl transition duration-200 shadow-lg shadow-purple-950/40 mt-2 text-center block">
                S'identifier →
            </button>
        </form>
    </div>

</body>
</html>
