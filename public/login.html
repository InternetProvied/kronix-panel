<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kronix - Authentification</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .neon-border {
            box-shadow: 0 0 15px rgba(147, 51, 234, 0.2), inset 0 0 15px rgba(147, 51, 234, 0.1);
        }
        .active-tab {
            border-bottom: 2px solid #9333ea;
            color: #ffffff;
        }
    </style>
</head>
<body class="bg-[#050508] text-gray-200 min-h-screen flex items-center justify-center font-sans antialiased relative overflow-hidden">
    
    <!-- Arrière-plan stylisé -->
    <div class="absolute top-[-20%] left-[-10%] w-[600px] h-[600px] bg-purple-900/10 rounded-full blur-[150px]"></div>
    <div class="absolute bottom-[-20%] right-[-10%] w-[600px] h-[600px] bg-purple-950/10 rounded-full blur-[150px]"></div>

    <div class="w-full max-w-md bg-[#0b0b12]/80 backdrop-blur-xl p-8 rounded-2xl border border-purple-950/30 neon-border z-10 mx-4">
        
        <!-- Logo / Titre -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-purple-600 font-mono">KRONIX</h1>
            <p class="text-gray-500 text-xs mt-1 tracking-widest uppercase">Système d'accès global</p>
        </div>

        <!-- Onglets Connexion / Créer un compte -->
        <div class="flex border-b border-gray-900 mb-6 text-sm font-medium text-gray-500">
            <button id="tab-login" onclick="switchTab('login')" class="flex-1 py-2 text-center active-tab transition duration-200">Connexion</button>
            <button id="tab-register" onclick="switchTab('register')" class="flex-1 py-2 text-center hover:text-gray-300 transition duration-200">Créer un compte</button>
        </div>

        <!-- Formulaire Unique (S'adapte selon l'onglet) -->
        <form id="auth-form" action="/login" method="POST" class="space-y-4">
            <div>
                <label class="block text-[11px] font-mono tracking-widest text-gray-400 uppercase mb-2">Nom d'utilisateur</label>
                <input type="text" name="username" required placeholder="Ex: Mathys" class="w-full bg-[#11111a] border border-gray-900 focus:border-purple-600 focus:outline-none rounded-xl py-3 px-4 text-sm text-white transition placeholder-gray-700">
            </div>

            <!-- Case Email supplémentaire (masquée par défaut, affichée uniquement pour l'inscription) -->
            <div id="email-field" class="hidden">
                <label class="block text-[11px] font-mono tracking-widest text-gray-400 uppercase mb-2">Adresse Email</label>
                <input type="email" name="email" placeholder="Ex: contact@kronix.xyz" class="w-full bg-[#11111a] border border-gray-900 focus:border-purple-600 focus:outline-none rounded-xl py-3 px-4 text-sm text-white transition placeholder-gray-700">
            </div>

            <div>
                <label class="block text-[11px] font-mono tracking-widest text-gray-400 uppercase mb-2">Mot de passe</label>
                <input type="password" name="password" required placeholder="••••••••" class="w-full bg-[#11111a] border border-gray-900 focus:border-purple-600 focus:outline-none rounded-xl py-3 px-4 text-sm text-white transition placeholder-gray-700">
            </div>

            <!-- Bouton Submit principal -->
            <button type="submit" id="submit-btn" class="w-full bg-purple-600 hover:bg-purple-500 text-white font-bold py-3 px-4 rounded-xl transition duration-200 shadow-lg shadow-purple-950/40 mt-2 text-center block">
                S'identifier →
            </button>
        </form>

        <!-- Séparateur -->
        <div class="relative flex py-4 items-center w-full">
            <div class="flex-grow border-t border-gray-900"></div>
            <span class="flex-shrink mx-4 text-gray-600 text-[10px] tracking-widest font-mono">OU</span>
            <div class="flex-grow border-t border-gray-900"></div>
        </div>

        <!-- Boutons API -->
        <div class="grid grid-cols-2 gap-3 w-full text-xs">
            <a href="/auth/discord" class="flex items-center justify-center gap-2 bg-[#5865F2]/10 hover:bg-[#5865F2]/20 border border-[#5865F2]/30 text-gray-300 py-3 px-4 rounded-xl transition font-medium">
                Discord
            </a>
            <a href="/auth/google" class="flex items-center justify-center gap-2 bg-white/5 hover:bg-white/10 border border-white/10 text-gray-300 py-3 px-4 rounded-xl transition font-medium">
                Google
            </a>
        </div>

    </div>

    <!-- Script pour basculer d'un mode à l'autre en restant fluide -->
    <script>
        function switchTab(mode) {
            const form = document.getElementById('auth-form');
            const emailField = document.getElementById('email-field');
            const emailInput = emailField.querySelector('input');
            const submitBtn = document.getElementById('submit-btn');
            const tabLogin = document.getElementById('tab-login');
            const tabRegister = document.getElementById('tab-register');

            if (mode === 'register') {
                form.action = '/register';
                emailField.classList.remove('hidden');
                emailInput.required = true;
                submitBtn.innerText = "Créer mon compte →";
                tabRegister.classList.add('active-tab');
                tabLogin.classList.remove('active-tab');
            } else {
                form.action = '/login';
                emailField.classList.add('hidden');
                emailInput.required = false;
                submitBtn.innerText = "S'identifier →";
                tabLogin.classList.add('active-tab');
                tabRegister.classList.remove('active-tab');
            }
        }
    </script>
</body>
</html>
